<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — NovaCart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">NovaCart</div>
    <button class="sidebar-close" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
    <nav class="sidebar-nav">
      <a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="#"><i class="fa-solid fa-user"></i> Profile</a>
      <a href="#"><i class="fa-solid fa-box"></i> Orders</a>
      <a href="#"><i class="fa-solid fa-heart"></i> Wishlist</a>
      <a href="cart.html" class="active"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="#"><i class="fa-solid fa-bell"></i> Notifications</a>
      <a href="#"><i class="fa-solid fa-headset"></i> Support</a>
      <a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </nav>
  </aside>

  <header class="header" id="header">
    <div class="header-inner">
      <div class="header-left">
        <button class="menu-btn" onclick="openSidebar()"><i class="fa-solid fa-bars"></i></button>
        <a href="index.html" class="brand">NovaCart</a>
      </div>
      <nav class="header-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
        <a href="cart.html" class="cart-link active">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </nav>
      <button class="mobile-cart-btn" onclick="window.location='cart.html'">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="cart-count" id="cartCountMobile">0</span>
      </button>
    </div>
  </header>

  <div class="page-wrapper">
    <h2 class="page-title">🛒 Your Cart</h2>
    <div id="cartContainer"></div>
  </div>

  <footer class="footer">
    <div class="footer-bottom" style="border-top:none">
      <p>&copy; 2025 NovaCart. All rights reserved.</p>
      <div class="social-links">
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-twitter"></i></a>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast">
    <i class="fa-solid fa-check-circle"></i>
    <span id="toastMsg">Done!</span>
  </div>

  <script src="app.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cartContainer');
      updateCartBadge();

      if (!cart.length) {
        container.innerHTML = `
          <div class="cart-empty">
            <i class="fa-solid fa-bag-shopping"></i>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet.</p>
            <a href="products.html" class="btn-primary" style="display:inline-block">Browse Products</a>
          </div>`;
        return;
      }

      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
      const shipping = subtotal > 100 ? 0 : 9.99;
      const total = subtotal + shipping;

      const itemsHTML = cart.map((item, idx) => `
        <div class="cart-item-card" id="item-${idx}">
          <div style="width:90px;height:90px;border-radius:10px;background:#f8fafc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:2rem;">🛍️</div>
          <div class="cart-item-info">
            <h3>${item.name}</h3>
            <div class="item-price">$${item.price.toFixed(2)}</div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${idx}, -1)"><i class="fa-solid fa-minus"></i></button>
              <span class="qty-display">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${idx}, 1)"><i class="fa-solid fa-plus"></i></button>
            </div>
          </div>
          <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
            <span style="font-weight:700;font-size:1.1rem">$${(item.price * item.qty).toFixed(2)}</span>
            <button class="cart-remove" onclick="removeItem(${idx})" title="Remove"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>`).join('');

      container.innerHTML = `
        ${itemsHTML}
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span>$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:#22c55e;font-weight:600">Free</span>' : '$'+shipping.toFixed(2)}</span></div>
          ${shipping > 0 ? `<div style="font-size:0.8rem;color:#6b7a8d;margin-top:4px">Add $${(100-subtotal).toFixed(2)} more for free shipping</div>` : ''}
          <div class="summary-row total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
          <button class="checkout-btn" onclick="checkout()">
            <i class="fa-solid fa-lock"></i> Proceed to Checkout
          </button>
          <a href="products.html" style="display:block;text-align:center;margin-top:1rem;color:var(--muted);font-size:0.9rem">
            <i class="fa-solid fa-arrow-left"></i> Continue Shopping
          </a>
        </div>`;
    }

    function changeQty(idx, delta) {
      let cart = getCart();
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) cart.splice(idx, 1);
      saveCart(cart);
      renderCart();
    }

    function removeItem(idx) {
      const card = document.getElementById(`item-${idx}`);
      if (card) {
        card.style.transform = 'translateX(30px)';
        card.style.opacity = '0';
        card.style.transition = 'all 0.3s ease';
      }
      setTimeout(() => {
        let cart = getCart();
        cart.splice(idx, 1);
        saveCart(cart);
        renderCart();
        showToast('Item removed');
      }, 300);
    }

    function checkout() {
      showToast('🎉 Order placed! (Demo)');
      setTimeout(() => {
        saveCart([]);
        renderCart();
      }, 1500);
    }

    renderCart();
  </script>
</body>
</html>
